repair_actions_prompt: |
  You are repairing the action layer of a robot planning representation.

  Fix action schemas only. Do not change the abstract goal unless the failure
  proves the goal is impossible to support with the current predicates.

  Task:
  <<TASK>>

  Failure context:
  <<FAILURE_CONTEXT_JSON>>

  Abstract goal:
  <<ABSTRACT_GOAL_JSON>>

  Predicate inventory:
  <<PREDICATE_INVENTORY_JSON>>

  Current actions:
  <<ACTION_SCHEMAS_JSON>>

  Grounding summary:
  <<GROUNDING_SUMMARY_JSON>>

  Return valid JSON only:
  {
    "actions": [
      {
        "name": "action_name",
        "parameters": ["?obj"],
        "precondition": "(and ...)",
        "effect": "(and ...)",
        "description": "what changed"
      }
    ],
    "repair_notes": ["short explanation", "..."]
  }

  Rules:
  - Preserve the current predicate inventory.
  - Ensure every goal-relevant predicate is achievable or maintainable.
  - Fix missing action influence, broken action chaining, and malformed schemas.

repair_predicates_prompt: |
  You are repairing the predicate layer of a robot planning representation.

  Update the predicate inventory so the abstract goal is expressible and the
  action layer has the state concepts it needs. Keep the inventory minimal.

  Task:
  <<TASK>>

  Failure context:
  <<FAILURE_CONTEXT_JSON>>

  Abstract goal:
  <<ABSTRACT_GOAL_JSON>>

  Current predicate inventory:
  <<PREDICATE_INVENTORY_JSON>>

  Current actions:
  <<ACTION_SCHEMAS_JSON>>

  Grounding summary:
  <<GROUNDING_SUMMARY_JSON>>

  Return valid JSON only:
  {
    "predicates": ["(predicate ?x)", "..."],
    "selection_rationale": ["short explanation", "..."],
    "omitted_predicates": ["optional omission note", "..."]
  }

  Rules:
  - Repair missing or inconsistent predicates first.
  - Keep only predicates needed for the goal, action semantics, or grounding.
  - Maintain consistent arity and reusable naming.

repair_goal_prompt: |
  You are repairing the abstract goal layer of a robot planning representation.

  Adjust the goal only when the action and predicate layers are coherent but the
  current intent is mis-specified or cannot be grounded as written.

  Task:
  <<TASK>>

  Failure context:
  <<FAILURE_CONTEXT_JSON>>

  Current abstract goal:
  <<ABSTRACT_GOAL_JSON>>

  Predicate inventory:
  <<PREDICATE_INVENTORY_JSON>>

  Actions:
  <<ACTION_SCHEMAS_JSON>>

  Grounding summary:
  <<GROUNDING_SUMMARY_JSON>>

  Return valid JSON only:
  {
    "summary": "updated intent summary",
    "goal_literals": ["(predicate symbolic_object)", "..."],
    "goal_objects": ["symbolic_object", "..."],
    "success_checks": ["short human-readable check", "..."]
  }

  Rules:
  - Keep the user’s intent intact whenever possible.
  - Prefer clarifying ambiguous object references or impossible success conditions over broad rewrites.
  - Do not add unnecessary subgoals.
