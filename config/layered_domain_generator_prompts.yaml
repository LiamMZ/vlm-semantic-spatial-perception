# Prompts for the LayeredDomainGenerator pipeline (L1–L3).
#
# Each section corresponds to one generation layer. All prompts use the
# <<TOKEN>> placeholder convention (see src/utils/prompt_utils.py).
# Every prompt includes a <<VALIDATION_ERRORS>> placeholder that is
# populated on retry attempts with the specific errors from the previous
# attempt, and left empty on the first attempt.

# ---------------------------------------------------------------------------
# L1: Goal Specification
# ---------------------------------------------------------------------------
l1_goal_spec_prompt: |
  You are a PDDL goal specification expert for a robotic manipulation system.

  Your task is to extract the **goal conditions** for the following task. Focus
  ONLY on the end state the robot must achieve — do not define predicates or
  actions yet.

  Task description:
  <<TASK>>

  Robot description:
  <<ROBOT_DESCRIPTION>>

  Observed objects in the scene (use EXACTLY these object_ids as arguments):
  <<OBJECTS_JSON>>

  **Rules:**
  1. Goal predicates must be **grounded literals** — use actual object_id values
     from the scene, NOT variables like ?obj. Example: `(on red_block_1 table_1)`.
  2. All argument tokens must be object_id values from the observed objects list.
  3. Goal predicates should describe the desired **end state** only.
  4. `global_predicates` are zero-parameter robot state predicates that must be
     true at the start (e.g. `hand-empty`, `arm-at-home`). Return names only,
     no parentheses.
  5. Use hyphens for multi-word predicate names (e.g. `hand-empty`, `on-top`).
  6. Predicate names must be lowercase with hyphens only (no underscores).

  <<VALIDATION_ERRORS>>

  Respond with valid JSON only:
  {
    "goal_predicates": ["(on red_block_1 blue_block_1)"],
    "goal_objects": ["red_block_1", "blue_block_1"],
    "global_predicates": ["hand-empty"]
  }

# ---------------------------------------------------------------------------
# L2: Predicate Vocabulary
# ---------------------------------------------------------------------------
l2_predicate_vocab_prompt: |
  You are a PDDL predicate vocabulary designer for a robotic manipulation system.

  Your task is to define the **minimal predicate vocabulary** sufficient to:
  1. Express all goal conditions (provided below)
  2. Express the initial scene state (object positions, relations)
  3. Support the state transitions needed to achieve the goals

  Task description:
  <<TASK>>

  Goal predicates from L1 (MUST be covered by your vocabulary):
  <<GOAL_PREDICATES_JSON>>

  Observed objects:
  <<OBJECTS_JSON>>

  Previously known predicates (DKB hints — reuse where applicable):
  <<DKB_HINTS>>

  **Rules:**
  1. Include ALL predicate names that appear in the goal predicates.
  2. Use PDDL format with ?-prefixed variables: `(on ?obj ?surface)`, `(holding ?obj)`.
  3. Zero-parameter predicates are allowed: `(hand-empty)`.
  4. All names must be lowercase-hyphenated: `hand-empty`, `on`, `holding`.
  5. Mark predicates as `sensed` if they represent properties the robot cannot
     directly control and must verify at runtime (e.g. `graspable`, `door-open`).
     For each sensed predicate, a `checked-<name>` variant will be auto-generated.
  6. Keep the set **minimal** — only predicates actually needed for this task.
  7. Arity consistency is critical: parameter count must be stable across all uses.

  **Predicate type guidelines:**
  - `state`: robot directly controls this (e.g. `holding`, `on`, `hand-empty`)
  - `sensed`: depends on external world, must be verified (e.g. `graspable`, `door-locked`)

  <<VALIDATION_ERRORS>>

  Respond with valid JSON only:
  {
    "predicate_signatures": [
      "(on ?obj ?surface)",
      "(holding ?obj)",
      "(hand-empty)",
      "(graspable ?obj)"
    ],
    "sensed_predicates": ["graspable"]
  }

# ---------------------------------------------------------------------------
# L3: Action Schemas
# ---------------------------------------------------------------------------
l3_action_schema_prompt: |
  You are a PDDL action schema designer for a robotic manipulation system.

  Your task is to define the **action schemas** required to achieve the given
  goals using ONLY the provided predicate vocabulary. Output pure symbolic PDDL
  action definitions — no execution detail.

  Task description:
  <<TASK>>

  Robot description:
  <<ROBOT_DESCRIPTION>>

  Goal predicates (L1):
  <<GOAL_PREDICATES_JSON>>

  Predicate vocabulary (L2) — use ONLY these predicates:
  <<PREDICATE_VOCAB_JSON>>

  Previously known action schemas (DKB hints — reuse where applicable):
  <<DKB_HINTS>>

  **Rules:**

  1. **Symbolic closure**: Use ONLY predicates from the vocabulary above. No new
     predicates. If you need one, say so in `validation_errors` and stop.

  2. **Parameter consistency**: Every `?var` used in `precondition` or `effect`
     MUST be declared in `parameters`.

  3. **Arity rule**: Predicate usage in pre/effects must match the exact parameter
     count defined in the vocabulary. `(holding ?obj)` is 1-parameter everywhere.

  4. **PDDL formatting**:
     - Parameters: list of strings like `"?obj"` or `"?surface"` (no type annotations)
     - Precondition/effect: single PDDL formula string with `and`, `not`, etc.
     - No quoted strings in formulas

  5. **ACTION CHAINING VALIDATION** (critical):
     - Effects of one action must EXACTLY match preconditions of the next action.
     - Example CORRECT: pick effect `(holding ?obj)` → place precondition `(holding ?obj)` ✓
     - Example BROKEN: pick effect `(holding ?obj)` → place precondition `(grasped ?obj)` ✗
     - Verify: pick→place, open→access, pour→empty, and any task-specific chains.

  6. **Achievability**: Every precondition must be satisfiable via:
     - Initial state (global_predicates or perception-derived facts), OR
     - Another action's effects

  7. **Goal achievability**: At least one action's effects must produce each goal predicate.

  8. **Sensing actions**: If any `checked-<name>` predicates appear in the vocabulary,
     add a corresponding sensing action in `sensing_actions` (e.g. `check-graspable`
     with effect `(checked-graspable ?obj)`). These are separate from main actions.

  **Verification checklist (complete before responding):**
  a) Arity: every predicate usage matches its definition
  b) Chain validation: list effects of A → preconditions of B for each sequential pair
  c) Achievability: each precondition reachable via init or prior action
  d) Goals: each goal achievable by at least one action's effects

  <<VALIDATION_ERRORS>>

  Respond with valid JSON only:
  {
    "actions": [
      {
        "name": "pick",
        "parameters": ["?obj"],
        "precondition": "(and (hand-empty) (on ?obj ?surface))",
        "effect": "(and (holding ?obj) (not (hand-empty)) (not (on ?obj ?surface)))"
      },
      {
        "name": "place",
        "parameters": ["?obj", "?surface"],
        "precondition": "(holding ?obj)",
        "effect": "(and (on ?obj ?surface) (hand-empty) (not (holding ?obj)))"
      }
    ],
    "sensing_actions": []
  }
